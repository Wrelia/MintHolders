name: MintHolders
version: '1.0.0'
main: com.wrelia.mintholders.MintHolders
api-version: '1.20'
author: Wrelia
description: PlaceholderAPI expansion plugin with configurable placeholders
softdepend: [PlaceholderAPI]

commands:
  mintholders:
    description: MintHolders admin command
    usage: /<command> reload
    permission: mintholders.reload

permissions:
  mintholders.reload:
    description: Allows reloading MintHolders configuration
    default: op
